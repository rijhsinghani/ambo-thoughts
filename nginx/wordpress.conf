fastcgi_cache_path /var/cache/nginx/ambo levels=1:2 keys_zone=ambo:10m max_size=100m inactive=60m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 80;
    server_name 34.74.60.206;
    root /var/www/ambo-thoughts;
    index index.php index.html;

    client_max_body_size 64M;

    # FastCGI cache bypass
    set $skip_cache 0;
    if ($request_method = POST) { set $skip_cache 1; }
    if ($query_string != "") { set $skip_cache 1; }
    if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") { set $skip_cache 1; }
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") { set $skip_cache 1; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_cache ambo;
        fastcgi_cache_valid 200 60m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # Block xmlrpc.php
    location = /xmlrpc.php { deny all; }

    # Block wp-config.php
    location = /wp-config.php { deny all; }

    # Deny .ht files
    location ~ /\.ht { deny all; }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Old .html URL redirects from GitHub Pages
    location ~ ^/(.+)\.html$ {
        return 301 /$1/;
    }

    # Handle /ambo-thoughts/ subdirectory from GitHub Pages
    location ^~ /ambo-thoughts/ {
        rewrite ^/ambo-thoughts/(.*)$ /$1 permanent;
    }
}
